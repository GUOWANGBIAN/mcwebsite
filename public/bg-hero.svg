<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e14;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(30,45,61,0.3)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <text x="960" y="540" font-family="sans-serif" font-size="48" fill="rgba(100,116,139,0.3)" text-anchor="middle" dominant-baseline="middle">替换为你的背景图片</text>
  <text x="960" y="600" font-family="sans-serif" font-size="24" fill="rgba(100,116,139,0.2)" text-anchor="middle" dominant-baseline="middle">public/bg-hero.png</text>
</svg>
